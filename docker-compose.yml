version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-passport-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_passport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digital-passport-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-passport-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/digital_passport
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-change-this-in-production
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: bash -c "npm run db:push && npm run db:seed && npm run dev"
    networks:
      - digital-passport-network

volumes:
  postgres_data:

networks:
  digital-passport-network:
    driver: bridge
